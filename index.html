<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF14 無人島工坊模擬器</title>
    <style>
        body { background-color: #1a1a1a; color: #e0e0e0; font-family: "Microsoft JhengHei", sans-serif; padding: 10px; margin: 0; overflow-x: hidden; }
        .container { max-width: 1800px; width: 98%; margin: auto; }
        
        #top-summary { position: sticky; top: 0; z-index: 100; background: #2d2d2d; padding: 12px 20px; border-radius: 0 0 8px 8px; border: 1px solid #ffd700; border-top: none; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
        .result-box { font-size: 1.5em; color: #00ff00; font-weight: bold; }
        .section { background: #2d2d2d; padding: 8px 12px; border-radius: 8px; margin-top: 8px; border: 1px solid #444; }
        .flex-row { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .flex-row > div { display: flex; align-items: center; gap: 6px; font-size: 13px; }
        select, input { background: #3d3d3d; color: white; border: 1px solid #666; padding: 4px 6px; border-radius: 4px; cursor: pointer; font-size: 13px; }

        details summary { cursor: pointer; color: #ffd700; font-weight: bold; padding: 5px; font-size: 14px; list-style: none; display: flex; align-items: center; gap: 15px; }
        details summary::-webkit-details-marker { display: none; }
        .master-checkbox { background: #222; padding: 3px 10px; border-radius: 4px; border: 1px solid #444; font-size: 12px; color: #eee; font-weight: normal; cursor: pointer; }
        .grid-no-icon { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 5px; }
        .checkbox-item { font-size: 12px; display: flex; align-items: center; cursor: pointer; }

        .filter-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
        .filter-label { font-size: 12px; color: #888; font-weight: bold; white-space: nowrap; }
        .btn-group { display: flex; gap: 4px; flex-wrap: wrap; }
        .btn-filter { padding: 4px 12px; font-size: 12px; background: transparent; color: #aaa; border: 1px solid #555; border-radius: 12px; cursor: pointer; white-space: nowrap; transition: 0.2s; }
        .btn-filter:hover { background: #333; color: #ddd; }
        .btn-filter.active { background: #ffd700; color: #000; border-color: #ffd700; font-weight: bold; }
        .divider { width: 1px; height: 16px; background: #666; margin: 0 5px; }
        
        .btn-combo { padding: 4px 12px; font-size: 12px; border-radius: 12px; cursor: pointer; background: transparent; border: 1px solid #ff9900; color: #ff9900; font-weight: bold; white-space: nowrap; }
        .btn-combo.active { background: #ff9900; color: #000; box-shadow: 0 0 8px rgba(255,153,0,0.5); }
        .btn-fav { padding: 4px 12px; font-size: 12px; border-radius: 12px; cursor: pointer; background: transparent; border: 1px solid #ff4466; color: #ff4466; font-weight: bold; white-space: nowrap; }
        .btn-fav.active { background: #ff4466; color: #fff; box-shadow: 0 0 8px rgba(255,68,102,0.5); }

        .main-layout { display: grid; grid-template-columns: 1fr 410px; gap: 12px; margin-top: 10px; align-items: start; }
        .days-container { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; overflow-x: auto; padding-bottom: 5px; }
        
        @media (max-width: 1400px) { .days-container { grid-template-columns: repeat(7, minmax(220px, 1fr)); } }
        @media (max-width: 1024px) {
            .main-layout { grid-template-columns: 1fr; }
            .days-container { grid-template-columns: repeat(7, minmax(260px, 1fr)); }
            .product-sidebar { max-height: 600px; margin-top: 15px; }
        }

        .day-col { background: #222; border: 2px solid #444; border-radius: 6px; display: flex; flex-direction: column; min-height: 650px; cursor: pointer; transition: all 0.2s; }
        .day-col.active { border-color: #ffd700; box-shadow: 0 0 10px rgba(255,215,0,0.3); background: #262626; }
        .day-col.rest { opacity: 0.6; }
        .day-col.drag-over { background: #2a3a2a; border-color: #00ff00; box-shadow: 0 0 15px rgba(0,255,0,0.4); }
        
        .day-header { background: #333; padding: 8px; text-align: center; border-radius: 4px 4px 0 0; font-weight: bold; font-size: 14px; color: #eee; }
        .day-header .day-sub { font-size: 12px; color: #999; margin-top: 4px; display: flex; justify-content: space-between; align-items: center; }
        .day-revenue { display: flex; justify-content: space-between; align-items: center; color: #ff4444; font-size: 14px; font-weight: bold; padding: 6px 10px; border-bottom: 1px solid #444; }
        .btn-clear-day { background: none; border: none; color: #ff4444; cursor: pointer; font-size: 16px; padding: 2px; line-height: 1; border-radius: 3px; }
        .btn-clear-day:hover { background: #555; color: #ff0000; }
        
        .slot-list { padding: 8px; flex: 1; display: flex; flex-direction: column; gap: 8px; }

        .schedule-slot { background: #333; padding: 10px 12px; border-radius: 6px; border-left: 4px solid #ffd700; display: flex; flex-direction: column; gap: 6px; position: relative; cursor: grab; }
        .schedule-slot:active { cursor: grabbing; }
        .schedule-slot.dragging { opacity: 0.4; border: 1px dashed #ffd700; }
        .schedule-slot.dummy { border-left-color: #555; background: #2a2a2a; opacity: 0.8; }
        
        .slot-row-1 { display: flex; justify-content: space-between; align-items: center; }
        .slot-time { color: #88aadd; font-family: monospace; font-size: 13px; font-weight: bold; letter-spacing: 0.5px; }
        
        .slot-actions { display: flex; align-items: center; gap: 3px; }
        .btn-move { background: none; border: none; color: #88aadd; font-size: 12px; cursor: pointer; padding: 2px 4px; border-radius: 3px; }
        .btn-move:hover { background: #555; color: #fff; }
        .btn-del { background: none; border: none; color: #ff4444; font-size: 16px; font-weight: bold; cursor: pointer; padding: 0 4px; line-height: 1; margin-left: 2px; }
        .btn-del:hover { color: #ff0000; transform: scale(1.2); }
        
        .slot-row-2 { display: flex; justify-content: space-between; align-items: center; }
        .slot-name { font-weight: bold; font-size: 16px; color: #fff; cursor: help; border-bottom: 1px dotted #888; }
        .slot-price { color: #00ff00; font-size: 15px; font-weight: bold; }
        .schedule-slot.dummy .slot-price { color: #555; }
        .schedule-slot.dummy .slot-name { color: #888; border-bottom: none; cursor: grab; }
        
        .slot-row-3 { display: flex; justify-content: space-between; align-items: center; }
        .slot-cat { font-size: 11px; color: #999; }
        .slot-combo { color: #ff9900; font-size: 12px; font-weight: bold; }

        .product-sidebar { background: #222; border: 1px solid #444; border-radius: 6px; display: flex; flex-direction: column; height: 100%; max-height: 800px; }
        .sidebar-header { background: #333; padding: 10px 12px; font-weight: bold; color: #ffd700; border-radius: 5px 5px 0 0; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .dummy-add-row { display: flex; justify-content: space-around; background: #2a2a2a; padding: 8px; border-bottom: 1px solid #444; }
        .btn-dummy { background: #444; border: 1px dashed #777; color: #ccc; border-radius: 4px; font-size: 12px; padding: 4px 8px; cursor: pointer; transition: 0.2s; }
        .btn-dummy:hover { background: #555; color: #fff; border-color: #aaa; }

        .product-list { overflow-y: auto; padding: 8px; flex: 1; }
        .product-item { background: #2a2a2a; border: 1px solid #3d3d3d; border-radius: 4px; padding: 10px; margin-bottom: 8px; display: flex; flex-direction: column; gap: 6px; }
        .product-item:hover { background: #333; border-color: #555; }
        .pi-row-1 { display: flex; justify-content: space-between; align-items: center; }
        .pi-name { font-weight: bold; font-size: 14px; color: #eee; display: flex; align-items: center; gap: 5px; }
        .btn-star { cursor: pointer; font-size: 16px; color: #555; user-select: none; line-height: 1; transition: 0.2s; }
        .btn-star.fav-active { color: #ffd700; text-shadow: 0 0 5px rgba(255,215,0,0.5); transform: scale(1.1); }
        .pi-time { font-size: 12px; color: #888; font-weight: normal; }
        .pi-row-2 { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #aaa; }
        .pi-row-3 { display: flex; justify-content: space-between; align-items: center; }
        .combo-badge { background: #ff9900; color: #000; font-size: 11px; padding: 2px 5px; border-radius: 3px; font-weight: bold; }
        .p-final-price { color: #00ff00; font-weight: bold; font-size: 15px; }
        .btn-add { padding: 5px 15px; background: #444; color: white; border: 1px solid #666; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .btn-add:hover { background: #ffd700; color: #000; border-color: #ffd700; }

        .drawer { display: none; margin-top: 10px; background: #1a1a1a; border: 1px dashed #555; padding: 15px; border-radius: 6px; }
        .mat-item { display: inline-block; padding: 4px 10px; margin: 3px 5px 3px 0; border-radius: 4px; font-size: 13px; cursor: pointer; transition: all 0.2s; user-select: none; }
        .mat-item:active { transform: scale(0.95); }
        .mat-item.dimmed { opacity: 0.3; filter: grayscale(100%); text-decoration: line-through; }
        .mat-gen { background: #333; border: 1px solid #555; }
        .mat-rare { background: #004466; border: 1px solid #0088cc; color: #fff; }
        .mat-live { background: #4a2222; border: 1px solid #aa4444; color: #fff; }
        .mat-crop { background: #224a22; border: 1px solid #44aa44; color: #fff; }
        .mat-count { color: #ffd700; font-weight: bold; margin-left: 5px; }
        .mat-row { display: flex; align-items: center; flex-wrap: wrap; margin-bottom: 10px; border-bottom: 1px dashed #333; padding-bottom: 10px; }
        .mat-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .mat-title { width: 90px; font-weight: bold; font-size: 14px; }

        .modal-overlay { display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.85); z-index: 999; align-items: center; justify-content: center; }
        .batch-modal { width: 95%; max-width: 1500px; height: 90vh; background: #1e1e1e; border-radius: 8px; border: 2px solid #ffd700; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.9); }
        .batch-header { background: #333; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #555; }
        .batch-filters { padding: 12px 20px; background: #262626; border-bottom: 1px solid #444; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .batch-content { flex: 1; overflow-y: auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 15px; align-content: start; }
        .batch-item { background: #2a2a2a; border: 1px solid #444; padding: 12px; border-radius: 6px; }
        .batch-item-name { font-weight: bold; color: #eee; font-size: 15px; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .batch-item-rank { font-size: 11px; color: #888; font-weight: normal; }
        .batch-controls { display: flex; flex-direction: column; gap: 8px; }
        .bc-row { display: flex; }
        .btn-radio { padding: 6px 0; border: 1px solid #555; background: #222; color: #aaa; cursor: pointer; font-size: 13px; font-weight: bold; flex: 1; text-align: center; transition: 0.1s; }
        .btn-radio:first-child { border-radius: 4px 0 0 4px; border-right: none; }
        .btn-radio:last-child { border-radius: 0 4px 4px 0; border-left: none; }
        .btn-radio:not(:first-child):not(:last-child) { border-right: none; }
        .btn-radio:active { transform: scale(0.95); }

        .pop-14 { background: #cc0000 !important; color: #fff !important; border-color: #ff4444 !important; }
        .pop-12 { background: #cc7700 !important; color: #fff !important; border-color: #ff9933 !important; }
        .pop-10 { background: #555 !important; color: #fff !important; border-color: #777 !important; }
        .pop-08 { background: #333 !important; color: #888 !important; border-color: #444 !important; }

        .sup-16 { background: #cc0000 !important; color: #fff !important; border-color: #ff4444 !important; }
        .sup-13 { background: #cc7700 !important; color: #fff !important; border-color: #ff9933 !important; }
        .sup-10 { background: #555 !important; color: #fff !important; border-color: #777 !important; }
        .sup-08 { background: #3377cc !important; color: #fff !important; border-color: #55aaff !important; }
        .sup-06 { background: #0044aa !important; color: #fff !important; border-color: #0066ff !important; }
    </style>
</head>
<body>

<div id="batchOverlay" class="modal-overlay" onclick="if(event.target===this) toggleBatchPanel()">
    <div class="batch-modal">
        <div class="batch-header">
            <h2 style="margin: 0; color: #ffd700; font-size: 20px;">⚙️ 全局市場行情設定 (點擊即存檔)</h2>
            <button class="btn-filter" style="background:#ff4444; color:#fff; border:none; font-size:14px; padding:6px 15px;" onclick="toggleBatchPanel()">完成並關閉</button>
        </div>
        <div class="batch-filters">
            <span class="filter-label">依時間尋找:</span>
            <div id="batchTimeFilters" class="btn-group">
                <button class="btn-filter active" onclick="filterBatchTime('全部', this)">全部</button>
                <button class="btn-filter" onclick="filterBatchTime(4, this)">4 小時</button>
                <button class="btn-filter" onclick="filterBatchTime(6, this)">6 小時</button>
                <button class="btn-filter" onclick="filterBatchTime(8, this)">8 小時</button>
            </div>
        </div>
        <div class="batch-content" id="batchList"></div>
    </div>
</div>

<div class="container">
    <div id="top-summary">
        <div class="result-box" id="finalWeeklyResult">全週預計總收益: 0</div>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn-filter" style="border-color:#0bf; color:#0bf; padding:6px 15px; font-size:14px;" onclick="toggleBatchPanel()">⚙️ 批次市場設定</button>
            <button class="btn-filter" style="padding:6px 15px; font-size:14px;" onclick="toggleDrawer('materialDrawer')">📦 材料清單</button>
            <button class="btn-filter" style="border-color:#ff9900; color:#ff9900; padding:6px 15px; font-size:14px;" onclick="toggleDrawer('codeDrawer')">💾 供需代碼分享</button>
            <button onclick="clearWeekly()" style="background:#800; color:white; border:none; padding:6px 15px; border-radius:4px; cursor:pointer; font-size:14px;">重設整週班表</button>
        </div>
    </div>

    <div id="materialDrawer" class="drawer">
        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 15px; flex-wrap: wrap;">
            <h3 style="margin:0; color:#ffd700; font-size:15px;">📦 本週所需材料總計 <span style="color:#aaa; font-size:12px; font-weight:normal;">(點擊標籤可標記為已採集)</span></h3>
            <div style="display: flex; align-items: center; gap: 5px;">
                <span style="color:#0bf; font-weight:bold; font-size:14px;">稀有素材：</span>
                <span id="rareMatList"></span>
            </div>
        </div>
        <div class="mat-row"><div class="mat-title" style="color:#ccc;">一般素材：</div><div id="generalMatList" style="flex:1;"></div></div>
        <div class="mat-row"><div class="mat-title" style="color:#f99;">畜牧素材：</div><div id="livestockMatList" style="flex:1;"></div></div>
        <div class="mat-row"><div class="mat-title" style="color:#9f9;">耕種素材：</div><div id="cropMatList" style="flex:1;"></div></div>
    </div>

    <div id="codeDrawer" class="drawer">
        <h3 style="margin-top:0; color:#ff9900; font-size:14px;">💾 市場供需狀態分享 (只同步市場，不會覆蓋玩家自己排的班表！)</h3>
        <textarea id="codeArea" style="width:100%; height:50px; background:#222; color:#0f0; border:1px solid #444; padding:5px; font-family:monospace; margin-bottom: 8px;" placeholder="在此貼上別人分享的代碼，或是點擊下方生成你的代碼..."></textarea>
        <div>
            <button class="btn-filter" style="background:#ff9900; color:#000; border-color:#ff9900;" onclick="exportMarketCode()">生成並複製代碼</button> 
            <button class="btn-filter" onclick="importMarketCode()">匯入代碼覆蓋當前市場</button>
        </div>
    </div>

    <div class="section">
        <div class="flex-row" style="margin-bottom: 8px;">
            <div>等級: <input type="number" id="userRank" value="18" min="1" max="20" style="width: 40px;" onchange="refreshAll()"></div>
            <div>工坊數: <input type="number" id="numWorkshops" value="3" min="1" max="4" style="width: 40px;" onchange="refreshAll()"></div>
            <div>工坊等級: <select id="wsLevel" onchange="refreshAll()"><option value="1.0">Lv1</option><option value="1.1">Lv2</option><option value="1.2">Lv3</option><option value="1.3">Lv4</option><option value="1.4" selected>Lv5 (1.4x)</option></select></div>
            <div>地標: <select id="landmarks" onchange="refreshAll()"><option value="10">0個</option><option value="15">1個</option><option value="20">2個</option><option value="25">3個</option><option value="35">4個</option><option value="45" selected>5個 (45)</option></select></div>
            <div>初始氣勢(週二): <input type="number" id="startGroove" value="0" min="0" max="45" style="width: 40px;" onchange="refreshAll()"></div>
            <div style="margin-left: auto; color: #888; font-size: 12px;">✅ 支援卡片拖曳跨日＆同日上下調換順序</div>
        </div>

        <details style="margin-bottom: 8px;" id="filterDetails">
            <summary>
                <div>▶ 🚫 材料排除 (點擊展開設定)</div>
                <div class="master-checkbox"><label onclick="event.stopPropagation()"><input type="checkbox" id="checkExLive" onchange="toggleAllLivestock(this.checked); refreshAll()"> 排除畜牧物資</label></div>
                <div class="master-checkbox"><label onclick="event.stopPropagation()"><input type="checkbox" id="checkExCrop" onchange="toggleAllCrops(this.checked); refreshAll()"> 排除耕種物資</label></div>
            </summary>
            <div id="filterContent" style="padding-top:10px;">
                <div class="grid-no-icon" id="livestockFilter"></div><hr style="border:0; border-top:1px solid #444; margin:5px 0;">
                <div class="grid-no-icon" id="cropFilter"></div>
            </div>
        </details>

        <div class="filter-row">
            <span class="filter-label">分類:</span>
            <div id="catFilters" class="btn-group"></div>
        </div>
        <div class="filter-row">
            <span class="filter-label">時間(多選):</span>
            <div id="timeFilters" class="btn-group">
                <button class="btn-filter active" data-time="全部" onclick="toggleTimeFilter('全部', this)">全部</button>
                <button class="btn-filter" data-time="4" onclick="toggleTimeFilter(4, this)">4h</button>
                <button class="btn-filter" data-time="6" onclick="toggleTimeFilter(6, this)">6h</button>
                <button class="btn-filter" data-time="8" onclick="toggleTimeFilter(8, this)">8h</button>
            </div>
            <div class="divider"></div>
            <button id="btnCombo" class="btn-combo" onclick="toggleComboFilter(this)">🔗 連鎖推薦</button>
            <button id="btnFavFilter" class="btn-fav" onclick="toggleFavFilter(this)">❤️ 最愛商品</button>
        </div>
    </div>

    <div class="main-layout">
        <div class="days-container" id="daysContainer"></div>
        
        <div class="product-sidebar">
            <div class="sidebar-header">
                <span id="sidebarTitle">選擇商品加入 星期二</span>
                <select id="sortSelect" onchange="changeSort(this.value)" style="background:#1a1a1a; color:#ffd700; border:1px solid #555; border-radius:4px; padding:2px 5px; font-weight:bold; cursor:pointer;">
                    <option value="default">預設排序</option>
                    <option value="priceDesc">價格：高到低</option>
                    <option value="priceAsc">價格：低到高</option>
                </select>
            </div>
            <div class="dummy-add-row">
                <span style="color:#aaa; font-size:12px; font-weight:bold; line-height: 24px;">⏳ 插入留白:</span>
                <button class="btn-dummy" onclick="addBlankTime(1)">1h</button>
                <button class="btn-dummy" onclick="addBlankTime(2)">2h</button>
                <button class="btn-dummy" onclick="addBlankTime(4)">4h</button>
                <button class="btn-dummy" onclick="addBlankTime(6)">6h</button>
                <button class="btn-dummy" onclick="addBlankTime(8)">8h</button>
            </div>
            <div class="product-list" id="productList"></div>
        </div>
    </div>
</div>

<script>
// --- 資料庫 ---
const rareMats = ["香薺", "石榴石原石", "雲杉原木", "錘頭鯊", "銀礦", "長臂蝦"];
const livestock = ["絨毛", "乳汁", "尖爪", "獸毛", "鳥蛋", "尖牙", "甲殼", "羽毛", "角片"];
const crops = ["甘藍", "南瓜", "新薯", "高山蘿蔔", "莓果", "洋蔥", "番茄", "小麥", "玉米", "小蘿蔔", "紅辣椒", "韭蔥", "花豆", "紅菜", "茄子", "西葫蘆", "西瓜", "甜新薯", "西蘭花", "水牛豆"];
const dayNames = ["星期二", "星期三", "星期四", "星期五", "星期六", "星期日", "星期一"];
const allCategories = ['藥品', '家具', '木工', '菜餚', '海產', '飾品', '防具', '金屬', '武器', '耐儲食', '紡織', '動物', '調料', '點心', '日用品', '窯爐'];

const products = [

function formatTime(hours) { return (hours % 24).toString().padStart(2, '0') + ':00'; }
function utf8_to_b64(str) { return window.btoa(unescape(encodeURIComponent(str))); }
function b64_to_utf8(str) { return decodeURIComponent(escape(window.atob(str))); }

function saveData() {
    const data = {
        userRank: document.getElementById('userRank').value,
        numWorkshops: document.getElementById('numWorkshops').value,
        wsLevel: document.getElementById('wsLevel').value,
        landmarks: document.getElementById('landmarks').value,
        startGroove: document.getElementById('startGroove').value,
        weeklySchedules: weeklySchedules,
        restDays: restDays,
        statusMap: statusMap,
        favorites: favorites
    };
    localStorage.setItem('ff14IslandConfig', JSON.stringify(data));
}

function loadData() {
    const saved = localStorage.getItem('ff14IslandConfig');
    if(saved) {
        try {
            const data = JSON.parse(saved);
            if(data.userRank) document.getElementById('userRank').value = data.userRank;
            if(data.numWorkshops) document.getElementById('numWorkshops').value = data.numWorkshops;
            if(data.wsLevel) document.getElementById('wsLevel').value = data.wsLevel;
            if(data.landmarks) document.getElementById('landmarks').value = data.landmarks;
            if(data.startGroove) document.getElementById('startGroove').value = data.startGroove;
            if(data.weeklySchedules) weeklySchedules = data.weeklySchedules;
            if(data.restDays) restDays = data.restDays;
            if(data.favorites) favorites = data.favorites;
            if(data.statusMap) { Object.keys(data.statusMap).forEach(k => { if(statusMap[k]) statusMap[k] = data.statusMap[k]; }); }
        } catch(e) { console.error("載入失敗", e); }
    }
}

// V17 優化: 移除迴圈內的 DOM 操作
function init() {
    loadData();
    
    document.getElementById('livestockFilter').innerHTML = livestock.map(i => `<div class="checkbox-item"><input type="checkbox" value="${i}" onchange="refreshAll()"> ${i}</div>`).join('');
    document.getElementById('cropFilter').innerHTML = crops.map(i => `<div class="checkbox-item"><input type="checkbox" value="${i}" onchange="refreshAll()"> ${i}</div>`).join('');
    
    const catHtml = `<button class="btn-filter active" onclick="filterByCat('全部', this)">全部</button>` + 
                    allCategories.map(c => `<button class="btn-filter" onclick="filterByCat('${c}', this)">${c}</button>`).join('');
    document.getElementById('catFilters').innerHTML = catHtml;

    refreshAll();
}

function toggleBatchPanel() {
    const overlay = document.getElementById('batchOverlay');
    if (overlay.style.display === 'flex') { overlay.style.display = 'none'; } else { renderBatchPanel(); overlay.style.display = 'flex'; }
}

function filterBatchTime(t, btn) {
    batchCurrentTime = t === '全部' ? '全部' : parseInt(t);
    document.querySelectorAll('#batchTimeFilters .btn-filter').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); renderBatchPanel();
}

function setBatchS(name, key, val) { statusMap[name][key] = parseFloat(val); renderBatchPanel(); refreshAll(); }

// V17 優化: 批次渲染
function renderBatchPanel() {
    const cont = document.getElementById('batchList');
    const scrollTop = cont.scrollTop;
    
    const html = [...products].sort((a,b)=>a.level - b.level).map(p => {
        if(batchCurrentTime !== '全部' && p.time !== batchCurrentTime) return '';
        const s = statusMap[p.name];
        return `
        <div class="batch-item">
            <div class="batch-item-name">${p.name} <span class="batch-item-rank">(Rank ${p.level} | ${p.time}h)</span></div>
            <div class="batch-controls">
                <div class="bc-row">
                    <button class="btn-radio ${s.pop==1.4?'pop-14':''}" onclick="setBatchS('${p.name}', 'pop', 1.4)">火爆</button>
                    <button class="btn-radio ${s.pop==1.2?'pop-12':''}" onclick="setBatchS('${p.name}', 'pop', 1.2)">矚目</button>
                    <button class="btn-radio ${s.pop==1.0?'pop-10':''}" onclick="setBatchS('${p.name}', 'pop', 1.0)">普通</button>
                    <button class="btn-radio ${s.pop==0.8?'pop-08':''}" onclick="setBatchS('${p.name}', 'pop', 0.8)">無人</button>
                </div>
                <div class="bc-row">
                    <button class="btn-radio ${s.supply==1.6?'sup-16':''}" onclick="setBatchS('${p.name}', 'supply', 1.6)">大缺</button>
                    <button class="btn-radio ${s.supply==1.3?'sup-13':''}" onclick="setBatchS('${p.name}', 'supply', 1.3)">缺貨</button>
                    <button class="btn-radio ${s.supply==1.0?'sup-10':''}" onclick="setBatchS('${p.name}', 'supply', 1.0)">正常</button>
                    <button class="btn-radio ${s.supply==0.8?'sup-08':''}" onclick="setBatchS('${p.name}', 'supply', 0.8)">過剩</button>
                    <button class="btn-radio ${s.supply==0.6?'sup-06':''}" onclick="setBatchS('${p.name}', 'supply', 0.6)">氾濫</button>
                </div>
            </div>
        </div>`;
    }).join('');
    
    cont.innerHTML = html; cont.scrollTop = scrollTop; 
}

function filterByCat(c, btn) { currentCat = c; document.querySelectorAll('#catFilters .btn-filter').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); updateProductList(); }

function toggleTimeFilter(t, btn) {
    if (t === '全部') {
        currentTimeLimits = ['全部'];
        document.querySelectorAll('#timeFilters .btn-filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    } else {
        const idx = currentTimeLimits.indexOf('全部');
        if (idx > -1) currentTimeLimits.splice(idx, 1);
        const tIdx = currentTimeLimits.indexOf(t);
        if (tIdx > -1) {
            currentTimeLimits.splice(tIdx, 1);
            btn.classList.remove('active');
        } else {
            currentTimeLimits.push(t);
            btn.classList.add('active');
        }
        if (currentTimeLimits.length === 0) {
            currentTimeLimits = ['全部'];
            document.querySelector('#timeFilters .btn-filter[data-time="全部"]').classList.add('active');
        } else {
            document.querySelector('#timeFilters .btn-filter[data-time="全部"]').classList.remove('active');
        }
    }
    updateProductList();
}

function toggleComboFilter(btn) { 
    if (weeklySchedules[currentPeriod].length === 0) return alert("請先在當前選中的星期加入至少一件商品，才能啟用連鎖推薦！");
    isComboFilterOn = !isComboFilterOn; btn.classList.toggle('active'); updateProductList(); 
}

function toggleFavFilter(btn) {
    isFavFilterOn = !isFavFilterOn; btn.classList.toggle('active'); updateProductList();
}

function toggleFav(name, event) {
    event.stopPropagation();
    if (favorites.includes(name)) { favorites = favorites.filter(n => n !== name); } 
    else { favorites.push(name); }
    updateProductList(); saveData();
}

function changeSort(val) { currentSort = val; updateProductList(); }

function updateS(n,k,v) { statusMap[n][k] = parseFloat(v); refreshAll(); }
function toggleDrawer(id) { const d = document.getElementById(id); d.style.display = d.style.display === 'block' ? 'none' : 'block'; }

function toggleAllLivestock(checked) { document.querySelectorAll('#livestockFilter input[type="checkbox"]').forEach(cb => cb.checked = checked); }
function toggleAllCrops(checked) { document.querySelectorAll('#cropFilter input[type="checkbox"]').forEach(cb => cb.checked = checked); }

function selectDay(d) {
    currentPeriod = d;
    document.getElementById('sidebarTitle').innerText = `選擇商品加入 ${dayNames[d-1]}`;
    if(isComboFilterOn && weeklySchedules[d].length === 0) { isComboFilterOn = false; document.getElementById('btnCombo').classList.remove('active'); }
    refreshAll();
}

// V17 優化: 阻止事件冒泡
function toggleRestDay(d, event) {
    event.stopPropagation();
    if(restDays.includes(d)) { restDays = restDays.filter(x => x !== d); } 
    else {
        if(restDays.length >= 2) return alert("一週最多只能設定 2 天休息日！");
        restDays.push(d); weeklySchedules[d] = []; 
    }
    refreshAll();
}

function clearDay(d, event) {
    event.stopPropagation();
    if (weeklySchedules[d].length > 0 && confirm(`確定清空 ${dayNames[d-1]} 的班表嗎？`)) {
        weeklySchedules[d] = [];
        if(d === currentPeriod && isComboFilterOn) { isComboFilterOn = false; document.getElementById('btnCombo').classList.remove('active'); }
        refreshAll();
    }
}

function addBlankTime(hours) {
    if(restDays.includes(currentPeriod)) return alert("休假中不能排班！請先取消休假。");
    const t = weeklySchedules[currentPeriod].reduce((s,i)=>s+i.time, 0);
    if(t + hours > 24) return alert("時間不足 (最多24h)");
    weeklySchedules[currentPeriod].push({ name: "時間留白", time: hours, base: 0, cats: [], materials: {}, isDummy: true });
    refreshAll();
}

// --- 拖曳系統 ---
let dragSrc = null;

function handleDragStart(e, d, i) {
    dragSrc = { d, i };
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => e.target.classList.add('dragging'), 0);
}

function handleDragEnd(e) {
    e.target.classList.remove('dragging');
    document.querySelectorAll('.day-col').forEach(col => col.classList.remove('drag-over'));
    dragSrc = null;
}

function handleDragOver(e) { e.preventDefault(); return false; }

function handleDragEnter(e) {
    e.preventDefault();
    const col = e.currentTarget;
    if(!col.classList.contains('rest')) col.classList.add('drag-over');
}

function handleDragLeave(e) {
    const col = e.currentTarget;
    if(e.relatedTarget && !col.contains(e.relatedTarget)) { col.classList.remove('drag-over'); }
}

function handleDrop(e, targetDay) {
    e.stopPropagation();
    const col = e.currentTarget;
    col.classList.remove('drag-over');

    if (!dragSrc) return;
    const { d: srcDay, i: srcIdx } = dragSrc;
    if (srcDay === targetDay) return;

    if (restDays.includes(targetDay)) return alert("目標日是休息日，無法排班！");

    const item = weeklySchedules[srcDay][srcIdx];
    const currentTotal = weeklySchedules[targetDay].reduce((s, x) => s + x.time, 0);
    if (currentTotal + item.time > 24) return alert(`時間不足！該日無法再塞入 ${item.time} 小時的商品。`);

    weeklySchedules[srcDay].splice(srcIdx, 1);
    weeklySchedules[targetDay].push(item);
    
    if(srcDay === currentPeriod && weeklySchedules[srcDay].length === 0 && isComboFilterOn) {
        isComboFilterOn = false; document.getElementById('btnCombo').classList.remove('active');
    }
    refreshAll();
}

function moveItem(d, i, dir, e) {
    e.stopPropagation();
    if (i + dir < 0 || i + dir >= weeklySchedules[d].length) return;
    const temp = weeklySchedules[d][i];
    weeklySchedules[d][i] = weeklySchedules[d][i + dir];
    weeklySchedules[d][i + dir] = temp;
    refreshAll();
}

// V17 優化: 拔除內層重複賦值，直接組裝 HTML 字串
function refreshAll() {
    let currentGroove = parseInt(document.getElementById('startGroove').value) || 0;
    const grooveLimit = parseInt(document.getElementById('landmarks').value);
    const wsMul = parseFloat(document.getElementById('wsLevel').value);
    const numWorkshops = parseInt(document.getElementById('numWorkshops').value) || 3;
    
    let totalWeeklyRevenue = 0;
    let allMaterialsNeeded = {};
    let daysHtml = "";
    
    for(let d=1; d<=7; d++) {
        const schedule = weeklySchedules[d];
        const isRest = restDays.includes(d);
        const isActive = currentPeriod === d;
        let dayRevenue = 0; 
        let lastP = null;
        let slotsHtml = "";
        let currentHour = 16;

        if(!isRest) {
            schedule.forEach((p, idx) => {
                let isCombo = false;
                let val = 0;
                
                if (!p.isDummy) {
                    isCombo = (lastP && !lastP.isDummy && p.name !== lastP.name && p.cats.some(c => lastP.cats.includes(c)));
                    if(isCombo) {
                        currentGroove += numWorkshops;
                        if(currentGroove > grooveLimit) currentGroove = grooveLimit;
                    }
                    const s = statusMap[p.name] || {pop:1, supply:1};
                    const unit = Math.floor(s.pop * s.supply * Math.floor(p.base * wsMul * (1 + currentGroove/100)));
                    val = unit * (isCombo ? 2 : 1);
                    dayRevenue += val;
                    Object.entries(p.materials).forEach(([m, qty]) => { allMaterialsNeeded[m] = (allMaterialsNeeded[m] || 0) + (qty * numWorkshops); });
                    lastP = p;
                } else {
                    lastP = null;
                }
                
                const st = formatTime(currentHour);
                currentHour += p.time;
                const et = formatTime(currentHour);
                
                if (p.isDummy) {
                    slotsHtml += `
                        <div class="schedule-slot dummy" draggable="true" ondragstart="handleDragStart(event, ${d}, ${idx})" ondragend="handleDragEnd(event)">
                            <div class="slot-row-1">
                                <span class="slot-time">${st} - ${et}</span>
                                <div class="slot-actions">
                                    <button class="btn-move" onclick="moveItem(${d}, ${idx}, -1, event)" title="上移">▲</button>
                                    <button class="btn-move" onclick="moveItem(${d}, ${idx}, 1, event)" title="下移">▼</button>
                                    <button class="btn-del" onclick="removeFromSchedule(${d}, ${idx}, event)">×</button>
                                </div>
                            </div>
                            <div class="slot-row-2">
                                <span class="slot-name">⏳ ${p.name}</span>
                                <span class="slot-price">無產出</span>
                            </div>
                            <div class="slot-row-3">
                                <span class="slot-cat">(${p.time}h)</span>
                                <span class="slot-combo"></span>
                            </div>
                        </div>`;
                } else {
                    const matTooltip = "所需材料：\n" + Object.entries(p.materials).map(([m, qty]) => `${m} x${qty}`).join("\n");
                    slotsHtml += `
                        <div class="schedule-slot" draggable="true" ondragstart="handleDragStart(event, ${d}, ${idx})" ondragend="handleDragEnd(event)">
                            <div class="slot-row-1">
                                <span class="slot-time">${st} - ${et}</span>
                                <div class="slot-actions">
                                    <button class="btn-move" onclick="moveItem(${d}, ${idx}, -1, event)" title="上移">▲</button>
                                    <button class="btn-move" onclick="moveItem(${d}, ${idx}, 1, event)" title="下移">▼</button>
                                    <button class="btn-del" onclick="removeFromSchedule(${d}, ${idx}, event)" title="刪除此商品">×</button>
                                </div>
                            </div>
                            <div class="slot-row-2">
                                <span class="slot-name" title="${matTooltip}">${p.name}</span>
                                <span class="slot-price" title="單間收益">$${val}</span>
                            </div>
                            <div class="slot-row-3">
                                <span class="slot-cat">${p.cats.join('/')}</span>
                                ${isCombo ? `<span class="slot-combo">(Combo x2)</span>` : `<span></span>`}
                            </div>
                        </div>`;
                }
            });
            if(schedule.reduce((s,i)=>s+i.time,0) > 24) slotsHtml += `<div style="color:#f44; font-size:13px; text-align:center; font-weight:bold;">⚠ 超時</div>`;
        } else {
            slotsHtml = `<div style="text-align:center; padding:20px 0; color:#666; font-size:14px; font-weight:bold;">本日公休</div>`;
        }
        
        // V18 修復核心：紀錄「當前選中之星期」在排完所有班表後的最終氣勢，供右邊選單預覽使用
        if (d === currentPeriod) {
            currentCachedGroove = currentGroove;
        }

        let dayTotalRevenue = dayRevenue * numWorkshops;
        totalWeeklyRevenue += dayTotalRevenue;

        daysHtml += `
            <div class="day-col ${isActive?'active':''} ${isRest?'rest':''}" onclick="selectDay(${d})" 
                 ondragover="handleDragOver(event)" ondragenter="handleDragEnter(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, ${d})">
                <div class="day-header">
                    <div>${dayNames[d-1]}</div>
                    <div class="day-sub"><span>週期 ${d}</span><label onclick="event.stopPropagation()"><input type="checkbox" ${isRest?'checked':''} onclick="toggleRestDay(${d}, event)"> 休</label></div>
                </div>
                <div class="day-revenue">
                    <span style="font-size:11px;">${isRest?'':'<button class="btn-clear-day" onclick="clearDay('+d+', event)" title="清空本日班表">🗑️</button>'}</span>
                    <span title="已乘上工坊數量">預估: $${dayTotalRevenue} <span style="color:#ff9900; font-size:12px;" title="結算氣勢/上限">(${currentGroove}/${grooveLimit})</span></span>
                </div>
                <div class="slot-list">${slotsHtml}</div>
            </div>`;
    }

    document.getElementById('daysContainer').innerHTML = daysHtml;
    document.getElementById('finalWeeklyResult').innerText = `全週預計總收益: ${totalWeeklyRevenue}`;
    
    // V18 修復：無需再傳參數，直接取用全域 cached 變數
    updateProductList(); 
    renderMaterialList(allMaterialsNeeded);
    saveData(); 
}

// V18 修復：改為直接取用全域 currentCachedGroove
function updateProductList() {
    const ws = parseFloat(document.getElementById('wsLevel').value);
    const numWorkshops = parseInt(document.getElementById('numWorkshops').value) || 3;
    const grooveLimit = parseInt(document.getElementById('landmarks').value);
    
    let grooveForDisplay = currentCachedGroove;

    const rank = parseInt(document.getElementById('userRank').value) || 1;
    const ex = Array.from(document.querySelectorAll('#livestockFilter input[type="checkbox"]:checked, #cropFilter input[type="checkbox"]:checked')).map(c => c.value);
    
    const sched = weeklySchedules[currentPeriod];
    let lastItem = null;
    if (sched.length > 0) {
        lastItem = sched[sched.length - 1];
        if (lastItem.isDummy) lastItem = null; 
    }

    let renderList = [];

    products.forEach(p => {
        if (p.level > rank || Object.keys(p.materials).some(m => ex.includes(m))) return;
        if (currentCat !== '全部' && !p.cats.includes(currentCat)) return;
        if (!currentTimeLimits.includes('全部') && !currentTimeLimits.includes(p.time)) return;
        
        let isComboMatch = lastItem && !lastItem.isDummy && (p.name !== lastItem.name) && p.cats.some(c => lastItem.cats.includes(c));
        if (isComboFilterOn && !isComboMatch) return;
        if (isFavFilterOn && !favorites.includes(p.name)) return;
        
        let previewGroove = grooveForDisplay;
        if(isComboMatch) {
            previewGroove += numWorkshops;
            if(previewGroove > grooveLimit) previewGroove = grooveLimit;
        }

        const s = statusMap[p.name] || {pop: 1, supply: 1};
        const est = Math.floor(s.pop * s.supply * Math.floor(p.base * ws * (1 + previewGroove/100)));
        renderList.push({ p, est, isComboMatch, s });
    });

    if (currentSort === 'priceDesc') renderList.sort((a, b) => b.est - a.est);
    else if (currentSort === 'priceAsc') renderList.sort((a, b) => a.est - b.est);

    // V17 優化: 一次性字串賦值
    document.getElementById('productList').innerHTML = renderList.map(item => {
        const { p, est, isComboMatch, s } = item;
        const isFav = favorites.includes(p.name);
        return `
        <div class="product-item">
            <div class="pi-row-1">
                <span class="pi-name">
                    <span class="btn-star ${isFav ? 'fav-active' : ''}" onclick="toggleFav('${p.name}', event)" title="加入/移除最愛">${isFav ? '★' : '☆'}</span>
                    ${p.name} <span class="pi-time">(${p.time}h)</span>
                </span>
                <span class="p-final-price" title="單間工坊預估">$${est}</span>
            </div>
            <div class="pi-row-2">
                <span>${p.cats.join('/')} | 成本: $${p.base}</span>
                ${isComboMatch?'<span class="combo-badge">⭐連鎖</span>':''}
            </div>
            <div class="pi-row-3">
                <div class="pi-selects">
                    <select onchange="updateS('${p.name}','pop',this.value)">
                        <option value="1.4" ${s.pop==1.4?'selected':''}>火爆</option>
                        <option value="1.2" ${s.pop==1.2?'selected':''}>矚目</option>
                        <option value="1.0" ${s.pop==1.0?'selected':''}>普通</option>
                        <option value="0.8" ${s.pop==0.8?'selected':''}>無人</option>
                    </select>
                    <select onchange="updateS('${p.name}','supply',this.value)">
                        <option value="1.6" ${s.supply==1.6?'selected':''}>大缺</option>
                        <option value="1.3" ${s.supply==1.3?'selected':''}>缺貨</option>
                        <option value="1.0" ${s.supply==1.0?'selected':''}>正常</option>
                        <option value="0.8" ${s.supply==0.8?'selected':''}>過剩</option>
                        <option value="0.6" ${s.supply==0.6?'selected':''}>氾濫</option>
                    </select>
                </div>
                <button class="btn-add" onclick="addToSchedule('${p.name}')">加入</button>
            </div>
        </div>`;
    }).join('');
}

function addToSchedule(name) {
    if(restDays.includes(currentPeriod)) return alert("休假中不能排班！請先取消休假。");
    const p = products.find(x => x.name === name);
    if(weeklySchedules[currentPeriod].reduce((s,i)=>s+i.time, 0) + p.time > 24) return alert("時間不足 (最多24h)");
    weeklySchedules[currentPeriod].push({...p, isDummy: false});
    refreshAll();
}

function removeFromSchedule(d, i, event) {
    event.stopPropagation();
    weeklySchedules[d].splice(i, 1);
    if(d === currentPeriod && weeklySchedules[d].length === 0 && isComboFilterOn) { isComboFilterOn = false; document.getElementById('btnCombo').classList.remove('active'); }
    refreshAll();
}

function renderMaterialList(mats) {
    let rareHtml = [], genHtml = [], liveHtml = [], cropHtml = [];
    Object.keys(mats).sort().forEach(m => {
        const html = `<div class="mat-item ${rareMats.includes(m)?'mat-rare':livestock.includes(m)?'mat-live':crops.includes(m)?'mat-crop':'mat-gen'}" onclick="this.classList.toggle('dimmed')" title="點擊標記為已採集">${m}<span class="mat-count">x${mats[m]}</span></div>`;
        if(rareMats.includes(m)) rareHtml.push(html);
        else if(livestock.includes(m)) liveHtml.push(html);
        else if(crops.includes(m)) cropHtml.push(html);
        else genHtml.push(html);
    });
    
    document.getElementById('rareMatList').innerHTML = rareHtml.join('');
    document.getElementById('generalMatList').innerHTML = genHtml.join('');
    document.getElementById('livestockMatList').innerHTML = liveHtml.join('');
    document.getElementById('cropMatList').innerHTML = cropHtml.join('');
}

function clearWeekly() { 
    if(confirm("確定清空所有班表與設定嗎？")) { 
        weeklySchedules = {1:[], 2:[], 3:[], 4:[], 5:[], 6:[], 7:[]}; 
        products.forEach(p => statusMap[p.name] = { pop: 1.0, supply: 1.0 });
        refreshAll(); 
    } 
}

function exportMarketCode() {
    const data = { market: statusMap };
    const code = utf8_to_b64(JSON.stringify(data));
    document.getElementById('codeArea').value = code; document.getElementById('codeArea').select(); document.execCommand('copy'); 
    alert("供需代碼已生成並複製到剪貼簿！快分享給朋友吧！");
}

function importMarketCode() {
    try {
        const inputCode = document.getElementById('codeArea').value.trim();
        if (!inputCode) return alert("請先貼上代碼！");
        
        let data;
        try { data = JSON.parse(b64_to_utf8(inputCode)); } catch(e) { data = JSON.parse(inputCode); }
        
        if(data && data.market && data.market["恢復藥"]) {
            Object.keys(data.market).forEach(k => { if(statusMap[k]) statusMap[k] = data.market[k]; });
            refreshAll(); 
            if (document.getElementById('batchOverlay').style.display === 'flex') { renderBatchPanel(); }
            alert("市場行情匯入成功！");
        } else {
            alert("這不是有效的專屬供需代碼！\n(可能拿到國外網站的代碼了，請使用本工具生成的代碼進行交流)");
        }
    } catch(e) { alert("代碼解析失敗，請確認代碼是否複製完整或格式正確！"); console.error(e); }
}

init();
</script>
